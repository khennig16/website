<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homelab Blueprint — Kel</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --bg:      #090b11;
  --bg2:     #0f1219;
  --bg3:     #151a26;
  --bg4:     #1b2133;
  --bdr:     #1e2538;
  --bdr2:    #28304a;
  --txt:     #c8d3f5;
  --muted:   #4a5580;
  --accent:  #738aff;
  --green:   #1db87a;
  --amber:   #f5a623;
  --purple:  #6e5fcf;
  --done:    #22d468;
  --red:     #f87171;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:13px}
body{
  font-family:'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace;
  background:var(--bg);color:var(--txt);
  height:100vh;display:flex;flex-direction:column;overflow:hidden;
  user-select:none;
}

/* ── TOPBAR ── */
#topbar{
  flex-shrink:0;height:44px;
  display:flex;align-items:center;gap:6px;padding:0 12px;
  background:var(--bg2);border-bottom:1px solid var(--bdr);
  z-index:300;
}
#logo{font-size:11px;font-weight:700;letter-spacing:2.5px;color:var(--accent);
  text-transform:uppercase;padding-right:12px;border-right:1px solid var(--bdr);margin-right:4px;}
.vsep{width:1px;height:20px;background:var(--bdr);margin:0 4px;flex-shrink:0;}

/* view tabs */
#vtabs{display:flex;gap:2px;}
.vtab{
  padding:3px 11px;border-radius:5px;font-size:9.5px;font-weight:700;
  letter-spacing:.8px;text-transform:uppercase;cursor:pointer;
  border:1px solid var(--bdr);color:var(--muted);transition:all .15s;white-space:nowrap;
}
.vtab.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.vtab:not(.on):hover{color:var(--txt);background:var(--bg3);}

/* toolbar buttons */
.tbtn{
  display:flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:5px;font-size:9.5px;font-weight:700;
  letter-spacing:.4px;cursor:pointer;border:1px solid var(--bdr);
  background:transparent;color:var(--muted);font-family:inherit;
  transition:all .15s;white-space:nowrap;
}
.tbtn:hover{color:var(--txt);background:var(--bg3);}
.tbtn.blue{background:var(--accent);color:#fff;border-color:var(--accent);}
.tbtn.blue:hover{background:#5a73ff;}
.tbtn.grn{color:var(--done);border-color:#123a22;}
.tbtn.grn:hover{background:#051a0f;}
.tbtn.red{color:var(--red);border-color:#4a1515;}
.tbtn.red:hover{background:#200f0f;}

/* mode indicator */
#mode-pill{
  margin-left:auto;padding:3px 10px;border-radius:4px;
  font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  background:var(--bg3);border:1px solid var(--bdr);color:var(--muted);
}

/* progress */
#prog-area{display:flex;align-items:center;gap:6px;margin-left:8px;}
#prog-track{width:80px;height:4px;background:var(--bdr);border-radius:2px;overflow:hidden;}
#prog-fill{height:4px;background:var(--done);border-radius:2px;transition:width .4s;width:0%;}
#prog-pct{font-size:9px;color:var(--muted);min-width:28px;}
#dirty-dot{width:6px;height:6px;border-radius:50%;background:var(--done);transition:background .3s;}
#dirty-dot.dirty{background:var(--amber);animation:blink .9s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── CANVAS WRAP ── */
#cwrap{flex:1;overflow:auto;position:relative;}
#canvas{
  position:relative;min-width:1300px;min-height:1800px;
  background-color:var(--bg);
  background-image:
    linear-gradient(var(--bdr) 1px,transparent 1px),
    linear-gradient(90deg,var(--bdr) 1px,transparent 1px);
  background-size:40px 40px;
}

/* ── SECTION BANDS (moveable, editable) ── */
.sband{
  position:absolute;left:0;right:0;
  border-top:1px solid var(--bdr);
  pointer-events:all;
  cursor:ns-resize;
  z-index:1;
}
.sband-label{
  position:absolute;left:10px;top:-10px;
  font-size:8px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;color:var(--muted);
  background:var(--bg);padding:0 6px;
  cursor:text;outline:none;
  white-space:nowrap;
}
.sband-label:focus{color:var(--txt);background:var(--bg3);border-radius:3px;}
.sband-handle{
  position:absolute;right:10px;top:-9px;
  font-size:9px;color:var(--bdr2);opacity:0;transition:opacity .15s;
  cursor:pointer;user-select:none;
}
.sband:hover .sband-handle{opacity:1;}
.sband-handle:hover{color:var(--red);}

/* ── SELECTION BOX ── */
#sel-box{
  position:absolute;border:1.5px dashed var(--accent);
  background:rgba(115,138,255,.06);pointer-events:none;
  display:none;z-index:900;border-radius:2px;
}

/* ── NODE ── */
.node{
  position:absolute;border-radius:8px;border:1px solid;
  min-width:180px;max-width:280px;cursor:grab;
  transition:box-shadow .15s;z-index:10;
  display:flex;flex-direction:column;
}
.node:active{cursor:grabbing;}
.node:hover{z-index:60;box-shadow:0 0 0 1.5px var(--accent),0 6px 28px rgba(0,0,0,.6);}
.node.sel{box-shadow:0 0 0 2px #fff,0 0 0 4px var(--accent)!important;z-index:70;}

/* state colours */
.s-current {background:#071a12;border-color:#1db87a;}
.s-progress{background:#1c1205;border-color:#f5a623;}
.s-planned {background:#0e0f22;border-color:#4a52bb;}

.s-current  .ntitle{color:#4ade80;}
.s-progress .ntitle{color:#fbbf24;}
.s-planned  .ntitle{color:#a5b4fc;}

/* node header */
.nhead{
  display:flex;align-items:flex-start;gap:6px;
  padding:8px 10px 6px;border-bottom:1px solid rgba(255,255,255,.05);
}
.ncheck{
  flex-shrink:0;width:14px;height:14px;border-radius:3px;
  border:1.5px solid var(--muted);background:transparent;
  cursor:pointer;margin-top:1px;display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.ncheck.checked{background:var(--done);border-color:var(--done);}
.ncheck.checked::after{content:'✓';font-size:9px;color:#000;font-weight:900;line-height:1;}
.ntitle{
  flex:1;font-size:11.5px;font-weight:700;line-height:1.3;
  outline:none;
}
.ntitle[contenteditable=true]{
  background:rgba(115,138,255,.1);border-radius:3px;padding:1px 3px;
  box-shadow:0 0 0 1px var(--accent);cursor:text;
}

/* node body */
.nbody{padding:5px 10px 6px 30px;}
.nsub{
  font-size:10px;line-height:1.55;color:var(--muted);
  outline:none;
}
.nsub[contenteditable=true]{
  background:rgba(115,138,255,.08);border-radius:3px;padding:1px 3px;
  box-shadow:0 0 0 1px var(--accent);cursor:text;color:var(--txt);
}

/* node footer */
.nfoot{
  display:flex;align-items:center;gap:4px;
  padding:4px 8px 5px;
  border-top:1px solid rgba(255,255,255,.04);
  opacity:0;transition:opacity .15s;pointer-events:none;
}
.node:hover .nfoot{opacity:1;pointer-events:all;}
.nfbtn{
  font-size:8.5px;font-weight:700;padding:2px 7px;border-radius:3px;
  cursor:pointer;border:1px solid var(--bdr);background:transparent;
  font-family:inherit;color:var(--muted);transition:all .12s;
}
.nfbtn:hover{color:var(--txt);background:var(--bg3);}
.nfbtn.note-btn{color:var(--accent);border-color:#2a3060;}
.nfbtn.note-btn.has-note{background:rgba(115,138,255,.15);}
.sbadge{
  margin-left:auto;font-size:7.5px;font-weight:700;letter-spacing:.8px;
  text-transform:uppercase;padding:1px 5px;border-radius:3px;
}
.s-current  .sbadge{color:var(--green);background:rgba(29,184,122,.1);}
.s-progress .sbadge{color:var(--amber);background:rgba(245,166,35,.1);}
.s-planned  .sbadge{color:#8b9cf8;background:rgba(107,112,222,.1);}

/* done overlay */
.node.done-node{opacity:.65;}
.node.done-node .ntitle{text-decoration:line-through;opacity:.6;}

/* ── ARROWS ── */
#arrow-svg{
  position:absolute;top:0;left:0;pointer-events:none;
  width:100%;height:100%;overflow:visible;z-index:5;
}
.arrow-line{pointer-events:stroke;cursor:pointer;}
.arrow-line:hover{stroke-opacity:1!important;}
.arrow-sel{stroke-opacity:1!important;filter:drop-shadow(0 0 3px var(--accent));}

/* ── NOTE PANEL ── */
#note-panel{
  position:fixed;right:0;top:44px;bottom:0;width:280px;
  background:var(--bg2);border-left:1px solid var(--bdr2);
  display:flex;flex-direction:column;z-index:200;
  transform:translateX(100%);transition:transform .2s ease;
}
#note-panel.open{transform:translateX(0);}
#note-hdr{
  padding:10px 12px;border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;gap:8px;
}
#note-hdr-title{flex:1;font-size:11px;font-weight:700;color:var(--accent);}
#note-close{cursor:pointer;color:var(--muted);font-size:14px;padding:2px 6px;border-radius:4px;}
#note-close:hover{color:var(--txt);background:var(--bg3);}
#note-textarea{
  flex:1;background:transparent;border:none;color:var(--txt);
  font-family:inherit;font-size:11px;line-height:1.7;
  padding:12px;resize:none;outline:none;
}
#note-save-row{
  padding:8px 12px;border-top:1px solid var(--bdr);
  display:flex;gap:6px;
}
#note-save{
  flex:1;padding:5px;border-radius:5px;border:1px solid var(--accent);
  background:transparent;color:var(--accent);font-family:inherit;
  font-size:10px;font-weight:700;cursor:pointer;
}
#note-save:hover{background:rgba(115,138,255,.15);}

/* ── ARROW EDIT BAR ── */
#arrow-bar{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);
  background:var(--bg3);border:1px solid var(--bdr2);border-radius:8px;
  padding:6px 10px;display:flex;align-items:center;gap:8px;
  box-shadow:0 8px 32px rgba(0,0,0,.7);
  transition:transform .2s ease;z-index:500;white-space:nowrap;
  font-size:10px;color:var(--muted);
}
#arrow-bar.show{transform:translateX(-50%) translateY(0);}
.abtn{
  padding:3px 10px;border-radius:4px;border:1px solid var(--bdr2);
  background:transparent;color:var(--muted);font-family:inherit;
  font-size:9.5px;font-weight:700;cursor:pointer;
}
.abtn:hover{color:var(--txt);background:var(--bg4);}
.abtn.red{color:var(--red);border-color:#4a1515;}
.abtn.red:hover{background:#200f0f;}

/* ── ARROW DRAW MODE ── */
body.draw-mode #canvas{cursor:crosshair;}
body.draw-mode .node{cursor:crosshair;}

/* ── CONTEXT MENU ── */
#ctx{
  position:fixed;z-index:1000;
  background:var(--bg3);border:1px solid var(--bdr2);
  border-radius:8px;padding:5px;min-width:190px;
  box-shadow:0 12px 40px rgba(0,0,0,.7);
  display:none;
}
#ctx.show{display:block;animation:pop .1s ease;}
@keyframes pop{from{opacity:0;transform:scale(.95) translateY(-3px)}to{opacity:1;transform:none}}
.cgrp{padding:2px 0;}
.cgrp+.cgrp{border-top:1px solid var(--bdr);margin-top:2px;padding-top:4px;}
.citem{
  display:flex;align-items:center;gap:8px;
  padding:5px 10px;font-size:11px;border-radius:5px;
  cursor:pointer;color:var(--muted);transition:all .1s;
}
.citem:hover{background:var(--bdr);color:var(--txt);}
.citem.hi{color:var(--accent);}
.citem.danger{color:var(--red);}
.citem.danger:hover{background:#200f0f;}
.cico{width:14px;text-align:center;font-size:11px;flex-shrink:0;}
.csub{font-size:8.5px;color:var(--muted);margin-left:auto;}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:18px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--bg3);border:1px solid var(--bdr2);border-radius:6px;
  padding:6px 16px;font-size:10px;color:var(--txt);
  box-shadow:0 4px 20px rgba(0,0,0,.5);opacity:0;
  transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap;z-index:900;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── MODAL ── */
#mbg{
  display:none;position:fixed;inset:0;z-index:1100;
  background:rgba(0,0,0,.72);align-items:center;justify-content:center;
}
#mbg.show{display:flex;}
#mbox{
  background:var(--bg3);border:1px solid var(--bdr2);border-radius:12px;
  padding:24px 28px;width:460px;max-width:95vw;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
  animation:pop .15s ease;
}
#mbox h2{font-size:13px;color:var(--accent);margin-bottom:14px;letter-spacing:.5px;}
#mbox p{font-size:10.5px;color:var(--muted);margin-bottom:7px;line-height:1.75;}
#mbox strong{color:var(--txt);}
#mbox kbd{
  background:var(--bg);border:1px solid var(--bdr2);border-radius:3px;
  padding:1px 5px;font-family:inherit;font-size:9px;color:var(--txt);
}
.mrow{display:flex;gap:8px;margin-top:18px;}
.mrow button{
  flex:1;padding:8px;border-radius:6px;cursor:pointer;
  font-size:10px;font-weight:700;font-family:inherit;
}
#mok{background:var(--accent);color:#fff;border:none;}

/* ── INLINE CTX FORM FIELDS ── */
.cinput,.cselect{
  width:100%;background:var(--bg2);border:1px solid var(--bdr2);
  border-radius:4px;color:var(--txt);font-family:inherit;font-size:10px;
  padding:4px 7px;margin:2px 0;outline:none;
}
.cinput:focus,.cselect:focus{border-color:var(--accent);}
.cinput::placeholder{color:var(--muted);}
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">

  <button class="tbtn red" id="btn-reset-all">✕ Reset</button>
  <button class="tbtn blue" id="btn-export">⬇ PNG</button>

</div>

<!-- CANVAS -->
<div id="cwrap">

        </marker>
        <marker id="ah-p" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">

          <path d="M2 2L8 5L2 8" fill="none" stroke="#738aff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>
    </svg>
    <div id="sel-box"></div>
  </div>
</div>

<!-- NOTE PANEL -->
<div id="note-panel">
  <div id="note-hdr">
    <div id="note-hdr-title">📝 Notes</div>
    <div id="note-close">✕</div>
  </div>
  <textarea id="note-textarea" placeholder="Add notes for this node…"></textarea>
  <div id="note-save-row">
    <button id="note-save">💾 Save note</button>
  </div>
</div>

<!-- ARROW EDIT BAR -->
<div id="arrow-bar">
  <span id="arrow-bar-label">Arrow selected</span>
  <select id="arrow-type-sel" class="cselect" style="width:110px;margin:0;">
    <option value="current">Current (solid)</option>
    <option value="planned">Planned (dashed)</option>
  </select>
  <button class="abtn" id="arrow-flip">⇄ Flip</button>
  <button class="abtn red" id="arrow-del">🗑 Delete</button>
  <button class="abtn" id="arrow-desel">✕</button>
</div>

<!-- CONTEXT MENU -->
<div id="ctx"></div>

<!-- TOAST -->
<div id="toast"></div>

<!-- MODAL -->
<div id="mbg">
  <div id="mbox">
    <h2 id="mtitle"></h2>
    <div id="mbody"></div>
    <div class="mrow"><button id="mok">OK</button></div>
  </div>
</div>

const SK = 'kel_homelab_v8';

// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
let nd={}, ad={}, sd={};   // node data, arrow data, section data
let nodeEls={}, arrowEls={}, sectionEls={};
let clipboard=null, selection=new Set(), curView='all';
let isDirty=false, arrowMode=false;
let arrowFrom=null;
let selArrow=null;
let noteTarget=null;

function getDefaults(){
  const n={},a={},s={};
  DEFS.nodes.forEach(([id,title,sub,state,layer,x,y,done,note])=>{
    n[id]={title,sub,state,layer,x,y,done,note};
  });
  DEFS.arrows.forEach(([id,from,to,type])=>{a[id]={from,to,type};});
  DEFS.sections.forEach(([id,label,y])=>{s[id]={label,y};});
  return{n,a,s};
}

function loadState(){
  try{
    const r=localStorage.getItem(SK);
    if(r){const p=JSON.parse(r);nd=p.nd||{};ad=p.ad||{};sd=p.sd||{};
      // backfill
      DEFS.nodes.forEach(([id,title,sub,state,layer,x,y,done,note])=>{
        if(!nd[id])nd[id]={title,sub,state,layer,x,y,done,note};
        if(nd[id].note===undefined)nd[id].note='';
      });
      DEFS.sections.forEach(([id,label,y])=>{if(!sd[id])sd[id]={label,y};});
      return;
    }
  }catch(e){}
  const d=getDefaults();nd=d.n;ad=d.a;sd=d.s;
}

function save(silent){
  try{localStorage.setItem(SK,JSON.stringify({nd,ad,sd}));}catch(e){}
  setDirty(false);
  if(!silent)toast('💾 Saved');
}

function setDirty(v){isDirty=v;document.getElementById('dirty-dot').classList.toggle('dirty',v);}
function dirty(){setDirty(true);}

// ══════════════════════════════════════════════════════
// CANVAS + HELPERS
// ══════════════════════════════════════════════════════
const canvas=document.getElementById('canvas');
const svgEl=document.getElementById('arrow-svg');
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function uid(){return'x'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function selAll(el){const r=document.createRange();r.selectNodeContents(el);const s=window.getSelection();s.removeAllRanges();s.addRange(r);}

function expand(){
  let mx=1000,my=1700;
  Object.keys(nd).forEach(id=>{
    const el=nodeEls[id];if(!el||el.style.display==='none')return;
    mx=Math.max(mx,nd[id].x+el.offsetWidth+120);
    my=Math.max(my,nd[id].y+el.offsetHeight+120);
  });
  Object.keys(sd).forEach(id=>{my=Math.max(my,sd[id].y+60);});
  canvas.style.minWidth=mx+'px';canvas.style.minHeight=my+'px';
}

// ══════════════════════════════════════════════════════
// VIEW FILTER
// ══════════════════════════════════════════════════════
function nodeVis(id){
  const d=nd[id];if(!d)return false;
  if(curView==='all')return true;
  if(curView==='current')return d.layer==='current'||d.layer==='both';
  if(curView==='planned')return d.layer==='planned'||d.layer==='both';
  return true;
}
function applyView(){
  Object.keys(nodeEls).forEach(id=>{
    const el=nodeEls[id];if(!el)return;
    el.style.display=nodeVis(id)?'':'none';
  });
  Object.keys(arrowEls).forEach(id=>{
    const a=ad[id];if(!a)return;
    const el=arrowEls[id];if(!el)return;
    const vis=nodeVis(a.from)&&nodeVis(a.to);
    el.style.display=vis?'':'none';
  });
  drawArrows();
}

// ══════════════════════════════════════════════════════
// SECTIONS — moveable + editable bands
// ══════════════════════════════════════════════════════
function makeSection(id){
  const d=sd[id];
  const div=document.createElement('div');
  div.className='sband';div.id='sb-'+id;
  div.style.top=d.y+'px';

  div.innerHTML=`
    <span class="sband-label" contenteditable="false" title="Double-click to edit">${esc(d.label)}</span>
    <span class="sband-handle" title="Delete section">✕</span>`;

  const lbl=div.querySelector('.sband-label');
  lbl.addEventListener('dblclick',e=>{
    e.stopPropagation();
    lbl.contentEditable='true';lbl.focus();selAll(lbl);
  });
  lbl.addEventListener('blur',()=>{
    lbl.contentEditable='false';
    sd[id].label=lbl.textContent.trim();dirty();
  });
  lbl.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();lbl.blur();}
    e.stopPropagation();
  });
  lbl.addEventListener('mousedown',e=>{if(lbl.contentEditable==='true')e.stopPropagation();});

  div.querySelector('.sband-handle').addEventListener('click',e=>{
    e.stopPropagation();
    if(!confirm('Delete this section band?'))return;
    div.remove();delete sectionEls[id];delete sd[id];dirty();
  });

  // drag to move vertically
  let sy,oy,moving=false;
  div.addEventListener('mousedown',e=>{
    if(e.target===lbl&&lbl.contentEditable==='true')return;
    if(e.target.classList.contains('sband-handle'))return;
    if(e.target===lbl&&e.detail===1){
      // single click on label = select (not drag)
    }
    moving=false;sy=e.clientY;oy=sd[id].y;
    div.style.cursor='ns-resize';
    const mv=e2=>{
      const dy=e2.clientY-sy;
      if(Math.abs(dy)>3)moving=true;
      sd[id].y=Math.max(0,oy+dy);
      div.style.top=sd[id].y+'px';
    };
    const up=()=>{
      div.style.cursor='';
      window.removeEventListener('mousemove',mv);
      window.removeEventListener('mouseup',up);
      if(moving)dirty();
    };
    window.addEventListener('mousemove',mv);
    window.addEventListener('mouseup',up);
    e.preventDefault();
  });

  div.addEventListener('contextmenu',e=>{
    e.preventDefault();e.stopPropagation();
    showCtx(e.clientX,e.clientY,[
      [{icon:'✏️',label:'Edit label',action:'edit'},{icon:'🗑',label:'Delete section',action:'del',cls:'danger'}]
    ],{
      edit:()=>{lbl.contentEditable='true';lbl.focus();selAll(lbl);},
      del:()=>{if(!confirm('Delete section?'))return;div.remove();delete sectionEls[id];delete sd[id];dirty();}
    });
  });

  canvas.appendChild(div);
  sectionEls[id]=div;
}

function addSection(y){
  const id=uid();
  sd[id]={label:'New section',y:y};
  makeSection(id);dirty();
}

// ══════════════════════════════════════════════════════
// NODES
// ══════════════════════════════════════════════════════
function stateLabel(s){return{current:'LIVE',progress:'WIP',planned:'PLAN'}[s]||s.toUpperCase();}

function makeNode(id){
  const d=nd[id];
  const div=document.createElement('div');
  div.id='n-'+id;
  div.className=`node s-${d.state}${d.done?' done-node':''}`;
  div.style.cssText=`left:${d.x}px;top:${d.y}px`;
  if(!nodeVis(id))div.style.display='none';

  div.innerHTML=`
    <div class="nhead">
      <div class="ncheck${d.done?' checked':''}" title="Mark done"></div>
      <div class="ntitle" contenteditable="false" data-f="title">${esc(d.title)}</div>
    </div>
    <div class="nbody">
      <div class="nsub" contenteditable="false" data-f="sub">${esc(d.sub).replace(/\n/g,'<br>')}</div>
    </div>
    <div class="nfoot">
      <button class="nfbtn nfbtn-cycle">↻ State</button>
      <button class="nfbtn nfbtn-dup">⎘ Dup</button>
      <button class="nfbtn note-btn${d.note?' has-note':''}" title="Notes">📝${d.note?' ●':''}</button>
      <span class="sbadge">${stateLabel(d.state)}</span>
    </div>`;

  // checkbox
  div.querySelector('.ncheck').addEventListener('click',e=>{e.stopPropagation();toggleDone(id);});

  // editable fields
  div.querySelectorAll('[data-f]').forEach(el=>{
    el.addEventListener('dblclick',e=>{
      e.stopPropagation();
      el.contentEditable='true';el.focus();selAll(el);
    });
    el.addEventListener('blur',()=>{
      el.contentEditable='false';
      const f=el.dataset.f;
      const val=f==='sub'
        ?el.innerHTML.replace(/<br\s*\/?>/gi,'\n').replace(/<[^>]+>/g,'')
        :el.textContent.trim();
      nd[id][f==='sub'?'sub':'title']=val;
      if(f==='sub')el.innerHTML=esc(val).replace(/\n/g,'<br>');
      dirty();
    });
    el.addEventListener('keydown',e=>{
      if(e.key==='Enter'&&el.dataset.f==='title'){e.preventDefault();el.blur();}
      e.stopPropagation();
    });
    el.addEventListener('mousedown',e=>{if(el.contentEditable==='true')e.stopPropagation();});
  });

  div.querySelector('.nfbtn-cycle').addEventListener('click',e=>{e.stopPropagation();cycleState(id);});
  div.querySelector('.nfbtn-dup').addEventListener('click',  e=>{e.stopPropagation();dupNode(id);});
  div.querySelector('.note-btn').addEventListener('click',    e=>{e.stopPropagation();openNote(id);});

  div.addEventListener('contextmenu',e=>{
    if(arrowMode)return;
    e.preventDefault();e.stopPropagation();
    showNodeCtx(e,id);
  });

  // arrow draw mode — click node to set from/to
  div.addEventListener('click',e=>{
    if(!arrowMode)return;
    e.stopPropagation();
    if(!arrowFrom){
      arrowFrom=id;
      div.style.boxShadow='0 0 0 2px var(--accent)';
      toast('Now click the destination node');
    } else {
      if(arrowFrom===id){arrowFrom=null;div.style.boxShadow='';return;}
      createArrow(arrowFrom,id,'current');
      nodeEls[arrowFrom].style.boxShadow='';
      arrowFrom=null;
      toast('Arrow created — click again or press Esc to exit');
    }
  });

  makeDraggable(div,id);
  canvas.appendChild(div);
  nodeEls[id]=div;
}

function refreshNode(id){
  const old=nodeEls[id];if(old)old.remove();
  delete nodeEls[id];makeNode(id);
  updateProg();drawArrows();
}

function toggleDone(id){nd[id].done=!nd[id].done;dirty();refreshNode(id);}

function cycleState(id){
  const order=['current','progress','planned'];
  const d=nd[id];
  d.state=order[(order.indexOf(d.state)+1)%order.length];
  dirty();refreshNode(id);
}

function setNodeState(id,state){nd[id].state=state;dirty();refreshNode(id);}
function setNodeLayer(id,layer){nd[id].layer=layer;dirty();refreshNode(id);applyView();}

function dupNode(id){
  const nid=uid();const s=nd[id];
  nd[nid]={...s,x:s.x+30,y:s.y+30,title:s.title+' (copy)'};
  makeNode(nid);dirty();updateProg();drawArrows();
  toast('Duplicated');
}

function delNode(id){
  nodeEls[id]?.remove();delete nodeEls[id];delete nd[id];
  // remove connected arrows
  Object.keys(ad).forEach(aid=>{
    if(ad[aid].from===id||ad[aid].to===id){
      arrowEls[aid]?.remove();delete arrowEls[aid];delete ad[aid];
    }
  });
  dirty();drawArrows();updateProg();
}

function addNode(x,y){
  const id=uid();
  nd[id]={title:'New node',sub:'Double-click to edit',state:'planned',layer:'both',x,y,done:false,note:''};
  makeNode(id);dirty();updateProg();
  setTimeout(()=>{
    const el=nodeEls[id]?.querySelector('[data-f="title"]');
    if(el){el.contentEditable='true';el.focus();selAll(el);}
  },50);
}

function pasteNode(x,y){
  if(!clipboard)return;
  const id=uid();
  nd[id]={...clipboard,x:x-90,y:y-40,title:clipboard.title+' (copy)'};
  makeNode(id);dirty();updateProg();toast('Pasted');
}

// ══════════════════════════════════════════════════════
// DRAG (nodes)
// ══════════════════════════════════════════════════════
function makeDraggable(el,id){
  let sx,sy,ox,oy,moved=false;
  el.addEventListener('mousedown',e=>{
    if(arrowMode)return;
    if(e.button!==0||e.target.contentEditable==='true'||e.target.tagName==='BUTTON')return;
    moved=false;sx=e.clientX;sy=e.clientY;ox=nd[id].x;oy=nd[id].y;
    el.style.zIndex=100;e.preventDefault();
    const mv=e2=>{
      const dx=e2.clientX-sx,dy=e2.clientY-sy;
      if(Math.abs(dx)>3||Math.abs(dy)>3)moved=true;
      nd[id].x=Math.max(0,ox+dx);nd[id].y=Math.max(0,oy+dy);
      el.style.left=nd[id].x+'px';el.style.top=nd[id].y+'px';

      // move entire selection together
      if(selection.has(id)){
        selection.forEach(sid=>{
          if(sid===id)return;
          nd[sid].x=Math.max(0,nd[sid].x+(e2.clientX-sx-0));
          // actually track delta per frame
        });
      }
      drawArrows();expand();
    };
    let lastX=sx,lastY=sy;
    const mv2=e2=>{
      const ddx=e2.clientX-lastX,ddy=e2.clientY-lastY;
      lastX=e2.clientX;lastY=e2.clientY;
      if(Math.abs(ddx)>0||Math.abs(ddy)>0)moved=true;
      nd[id].x=Math.max(0,nd[id].x+ddx);nd[id].y=Math.max(0,nd[id].y+ddy);
      el.style.left=nd[id].x+'px';el.style.top=nd[id].y+'px';
      if(selection.has(id)){
        selection.forEach(sid=>{
          if(sid===id)return;
          nd[sid].x=Math.max(0,nd[sid].x+ddx);
          nd[sid].y=Math.max(0,nd[sid].y+ddy);
          if(nodeEls[sid]){nodeEls[sid].style.left=nd[sid].x+'px';nodeEls[sid].style.top=nd[sid].y+'px';}
        });
      }
      drawArrows();expand();
    };
    const up=()=>{
      el.style.zIndex=selection.has(id)?70:10;
      window.removeEventListener('mousemove',mv2);
      window.removeEventListener('mouseup',up);
      if(moved)dirty();
    };
    window.addEventListener('mousemove',mv2);
    window.addEventListener('mouseup',up);
  });
  el.addEventListener('touchstart',e=>{
    if(arrowMode||e.target.contentEditable==='true'||e.target.tagName==='BUTTON')return;
    const t=e.touches[0];sx=t.clientX;sy=t.clientY;ox=nd[id].x;oy=nd[id].y;
    el.style.zIndex=100;e.preventDefault();
  },{passive:false});
  el.addEventListener('touchmove',e=>{
    const t=e.touches[0];
    nd[id].x=Math.max(0,ox+(t.clientX-sx));nd[id].y=Math.max(0,oy+(t.clientY-sy));
    el.style.left=nd[id].x+'px';el.style.top=nd[id].y+'px';
    drawArrows();e.preventDefault();
  },{passive:false});
  el.addEventListener('touchend',()=>{el.style.zIndex=10;dirty();});
}

// ══════════════════════════════════════════════════════
// ARROWS
// ══════════════════════════════════════════════════════
function nodeCenter(id){
  const el=nodeEls[id];
  if(!el||el.style.display==='none')return null;
  return{x:nd[id].x+el.offsetWidth/2,y:nd[id].y+el.offsetHeight/2};
}

function drawArrows(){
  svgEl.querySelectorAll('line').forEach(e=>e.remove());
  arrowEls={};
  Object.keys(ad).forEach(id=>{
    const a=ad[id];
    const A=nodeCenter(a.from),B=nodeCenter(a.to);
    if(!A||!B)return;
    const isSel=selArrow===id;
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',A.x);l.setAttribute('y1',A.y);
    l.setAttribute('x2',B.x);l.setAttribute('y2',B.y);
    const planned=a.type==='planned';
    const col=isSel?'#738aff':planned?'#4a52bb':'#1db87a';
    l.setAttribute('stroke',col);
    l.setAttribute('stroke-width',isSel?'2':'1.2');
    l.setAttribute('stroke-opacity',isSel?'1':'.45');
    if(planned)l.setAttribute('stroke-dasharray','6 4');
    l.setAttribute('marker-end',`url(#${isSel?'ah-c-sel':planned?'ah-p':'ah-c'})`);
    l.classList.add('arrow-line');
    l.dataset.aid=id;
    l.style.pointerEvents='stroke';
    l.style.cursor='pointer';
    // need a wider invisible hit area
    const hit=document.createElementNS('http://www.w3.org/2000/svg','line');
    hit.setAttribute('x1',A.x);hit.setAttribute('y1',A.y);
    hit.setAttribute('x2',B.x);hit.setAttribute('y2',B.y);
    hit.setAttribute('stroke','transparent');hit.setAttribute('stroke-width','12');
    hit.style.cursor='pointer';hit.dataset.aid=id;
    hit.addEventListener('click',e=>{e.stopPropagation();selectArrow(id);});
    hit.addEventListener('contextmenu',e=>{e.preventDefault();e.stopPropagation();selectArrow(id);showArrowCtx(e,id);});
    svgEl.appendChild(l);svgEl.appendChild(hit);
    arrowEls[id]=l;
  });
}

function createArrow(from,to,type){
  const id=uid();
  ad[id]={from,to,type};
  dirty();drawArrows();
}

function selectArrow(id){
  selArrow=id;
  drawArrows();
  const bar=document.getElementById('arrow-bar');
  bar.classList.add('show');
  const sel=document.getElementById('arrow-type-sel');
  sel.value=ad[id]?.type||'current';
  document.getElementById('arrow-bar-label').textContent=
    `${nd[ad[id]?.from]?.title||'?'} → ${nd[ad[id]?.to]?.title||'?'}`;
}

function deselectArrow(){
  selArrow=null;drawArrows();
  document.getElementById('arrow-bar').classList.remove('show');
}

function deleteArrow(id){
  arrowEls[id]?.remove();delete arrowEls[id];delete ad[id];
  deselectArrow();dirty();drawArrows();
}

document.getElementById('arrow-type-sel').addEventListener('change',e=>{
  if(!selArrow||!ad[selArrow])return;
  ad[selArrow].type=e.target.value;dirty();drawArrows();
});
document.getElementById('arrow-flip').addEventListener('click',()=>{
  if(!selArrow||!ad[selArrow])return;
  const a=ad[selArrow];[a.from,a.to]=[a.to,a.from];dirty();drawArrows();
  selectArrow(selArrow);
});
document.getElementById('arrow-del').addEventListener('click',()=>{
  if(selArrow)deleteArrow(selArrow);
});
document.getElementById('arrow-desel').addEventListener('click',deselectArrow);

// ARROW DRAW MODE
// ══════════════════════════════════════════════════════
const drawBtn=document.getElementById('btn-draw-arrow');
drawBtn.addEventListener('click',()=>{
  arrowMode=!arrowMode;arrowFrom=null;
  document.body.classList.toggle('draw-mode',arrowMode);
  drawBtn.classList.toggle('blue',arrowMode);
  document.getElementById('mode-pill').textContent=arrowMode?'DRAW ARROW':'SELECT';
  if(!arrowMode)toast('Arrow mode off');
  else toast('Click source node, then destination node');
});

// ══════════════════════════════════════════════════════
// BOX SELECT
// ══════════════════════════════════════════════════════
const selBox=document.getElementById('sel-box');
let selBoxing=false,sbx1,sby1;

canvas.addEventListener('mousedown',e=>{
  if(arrowMode)return;
  if(e.target!==canvas&&!e.target.classList.contains('sband')&&
     !e.target.classList.contains('sec-rule')&&!svgEl.contains(e.target))return;
  if(e.button!==0)return;
  deselectArrow();
  selBoxing=true;
  const r=canvas.getBoundingClientRect();
  const wrap=document.getElementById('cwrap');
  sbx1=e.clientX-r.left+wrap.scrollLeft;
  sby1=e.clientY-r.top+wrap.scrollTop;
  selBox.style.cssText=`display:block;left:${sbx1}px;top:${sby1}px;width:0;height:0`;
  e.preventDefault();
});

window.addEventListener('mousemove',e=>{
  if(!selBoxing)return;
  const r=canvas.getBoundingClientRect();
  const wrap=document.getElementById('cwrap');
  const cx=e.clientX-r.left+wrap.scrollLeft;
  const cy=e.clientY-r.top+wrap.scrollTop;
  const x=Math.min(sbx1,cx),y=Math.min(sby1,cy);
  const w=Math.abs(cx-sbx1),h=Math.abs(cy-sby1);
  selBox.style.left=x+'px';selBox.style.top=y+'px';
  selBox.style.width=w+'px';selBox.style.height=h+'px';
});

window.addEventListener('mouseup',e=>{
  if(!selBoxing)return;
  selBoxing=false;
  selBox.style.display='none';
  const bx=parseInt(selBox.style.left),by=parseInt(selBox.style.top);
  const bw=parseInt(selBox.style.width),bh=parseInt(selBox.style.height);
  if(bw<5&&bh<5){clearSelection();return;}
  clearSelection();
  Object.keys(nd).forEach(id=>{
    const el=nodeEls[id];if(!el||el.style.display==='none')return;
    const nx=nd[id].x,ny=nd[id].y,nw=el.offsetWidth,nh=el.offsetHeight;
    if(nx<bx+bw&&nx+nw>bx&&ny<by+bh&&ny+nh>by){
      selection.add(id);el.classList.add('sel');
    }
  });
  if(selection.size)toast(`${selection.size} node${selection.size>1?'s':''} selected`);
});

function clearSelection(){
  selection.forEach(id=>nodeEls[id]?.classList.remove('sel'));
  selection.clear();
}

document.getElementById('btn-selall').addEventListener('click',()=>{
  clearSelection();
  Object.keys(nd).forEach(id=>{
    const el=nodeEls[id];if(!el||el.style.display==='none')return;
    selection.add(id);el.classList.add('sel');
  });
  toast(`All ${selection.size} nodes selected`);
});

// ══════════════════════════════════════════════════════
// NOTES PANEL
// ══════════════════════════════════════════════════════
function openNote(id){
  noteTarget=id;
  const panel=document.getElementById('note-panel');
  document.getElementById('note-hdr-title').textContent='📝 '+nd[id].title;
  document.getElementById('note-textarea').value=nd[id].note||'';
  panel.classList.add('open');
  document.getElementById('note-textarea').focus();
}

document.getElementById('note-close').addEventListener('click',()=>{
  document.getElementById('note-panel').classList.remove('open');
  noteTarget=null;
});
document.getElementById('note-save').addEventListener('click',()=>{
  if(!noteTarget)return;
  nd[noteTarget].note=document.getElementById('note-textarea').value;
  dirty();refreshNode(noteTarget);
  document.getElementById('note-panel').classList.remove('open');
  toast('Note saved');noteTarget=null;
});

// ══════════════════════════════════════════════════════
// CONTEXT MENUS
// ══════════════════════════════════════════════════════
const ctxEl=document.getElementById('ctx');

function showCtx(x,y,groups,handlers){
  ctxEl.innerHTML=groups.map(g=>
    `<div class="cgrp">${g.map(it=>{
      if(!it)return'';
      const cls=it.cls?` ${it.cls}`:'';
      const sub=it.sub?`<span class="csub">${it.sub}</span>`:'';
      const dis=it.dis?' style="opacity:.4;pointer-events:none"':'';
      return`<div class="citem${cls}"data-a="${it.action||''}"${dis}>
        <span class="cico">${it.icon||''}</span>${it.label}${sub}</div>`;
    }).join('')}</div>`
  ).join('');
  const vw=window.innerWidth,vh=window.innerHeight;
  ctxEl.style.cssText=`left:${x}px;top:${y}px`;
  ctxEl.classList.add('show');
  // reposition if off-screen
  const r=ctxEl.getBoundingClientRect();
  if(r.right>vw)ctxEl.style.left=(x-r.width)+'px';
  if(r.bottom>vh)ctxEl.style.top=(y-r.height)+'px';
  ctxEl.querySelectorAll('[data-a]').forEach(el=>{
    const a=el.dataset.a;
    if(a&&handlers[a])el.addEventListener('click',()=>{hideCtx();handlers[a]();});
  });
}

function hideCtx(){ctxEl.classList.remove('show');ctxEl.innerHTML='';}
document.addEventListener('click',()=>{hideCtx();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){hideCtx();deselectArrow();if(arrowMode){arrowMode=false;arrowFrom=null;document.body.classList.remove('draw-mode');drawBtn.classList.remove('blue');document.getElementById('mode-pill').textContent='SELECT';}}});

function showNodeCtx(e,id){
  const d=nd[id];
  showCtx(e.clientX,e.clientY,[
    [
      {icon:'✏️',label:'Edit title',action:'et'},
      {icon:'📝',label:'Edit subtitle',action:'es'},
      {icon:'📋',label:'Open notes',action:'note'},
    ],
    [
      {icon:'⎘',label:'Duplicate',action:'dup'},
      {icon:'📄',label:'Copy',action:'copy',sub:'Ctrl+C'},
      {icon:'📋',label:'Paste',action:'paste',dis:!clipboard},
    ],
    [
      {icon:'🟢',label:'Current',action:'sc'},
      {icon:'🟡',label:'In progress',action:'sp'},
      {icon:'🟣',label:'Planned',action:'sl'},
    ],
    [
      {icon:'📗',label:'Layer: Both',action:'lb'},
      {icon:'📘',label:'Layer: Current only',action:'lc'},
      {icon:'📙',label:'Layer: Planned only',action:'lp'},
    ],
    [
      {icon:'✏️',label:'Draw arrow from here',action:'draw',cls:'hi'},
    ],
    [
      {icon:'🗑',label:'Delete node',action:'del',cls:'danger'},
    ],
  ],{
    et:()=>startEdit(id,'title'),
    es:()=>startEdit(id,'sub'),
    note:()=>openNote(id),
    dup:()=>dupNode(id),
    copy:()=>{clipboard=JSON.parse(JSON.stringify(d));toast('Copied');},
    paste:()=>pasteNode(nd[id].x+30,nd[id].y+30),
    sc:()=>setNodeState(id,'current'),
    sp:()=>setNodeState(id,'progress'),
    sl:()=>setNodeState(id,'planned'),
    lb:()=>setNodeLayer(id,'both'),
    lc:()=>setNodeLayer(id,'current'),
    lp:()=>setNodeLayer(id,'planned'),
    draw:()=>{
      if(!arrowMode){arrowMode=true;document.body.classList.add('draw-mode');drawBtn.classList.add('blue');document.getElementById('mode-pill').textContent='DRAW ARROW';}
      arrowFrom=id;nodeEls[id].style.boxShadow='0 0 0 2px var(--accent)';
      toast('Now click the destination node');
    },
    del:()=>{if(confirm(`Delete "${d.title}"?`))delNode(id);},
  });
}

function showArrowCtx(e,id){
  const a=ad[id];if(!a)return;
  showCtx(e.clientX,e.clientY,[
    [
      {icon:'⇄',label:'Flip direction',action:'flip'},
      {icon:'◌',label:'Make planned (dashed)',action:'mkp'},
      {icon:'●',label:'Make current (solid)',action:'mkc'},
    ],
    [
      {icon:'🗑',label:'Delete arrow',action:'del',cls:'danger'},
    ],
  ],{
    flip:()=>{[a.from,a.to]=[a.to,a.from];dirty();drawArrows();},
    mkp:()=>{a.type='planned';dirty();drawArrows();},
    mkc:()=>{a.type='current';dirty();drawArrows();},
    del:()=>deleteArrow(id),
  });
}

// canvas right-click
canvas.addEventListener('contextmenu',e=>{
  if(arrowMode)return;
  if(e.target.closest('.node')||e.target.closest('.sband'))return;
  e.preventDefault();
  const wrap=document.getElementById('cwrap');
  const r=canvas.getBoundingClientRect();
  const cx=e.clientX-r.left+wrap.scrollLeft;
  const cy=e.clientY-r.top+wrap.scrollTop;
  showCtx(e.clientX,e.clientY,[
    [
      {icon:'➕',label:'Add node here',action:'add',cls:'hi'},
      {icon:'📋',label:'Paste here',action:'paste',dis:!clipboard},
      {icon:'─',label:'Add section band',action:'sec'},
    ],
    [
      {icon:'⬜',label:'Select all',action:'sall'},
      {icon:'✕',label:'Clear selection',action:'clr',dis:!selection.size},
    ],
    [
      {icon:'💾',label:'Save',action:'save'},
      {icon:'⬇',label:'Export PNG',action:'exp'},
    ],
    [
      {icon:'?',label:'Help',action:'help'},
    ],
  ],{
    add:()=>addNode(cx-90,cy-40),
    paste:()=>pasteNode(cx,cy),
    sec:()=>addSection(cy),
    sall:()=>{clearSelection();Object.keys(nd).forEach(id=>{const el=nodeEls[id];if(!el||el.style.display==='none')return;selection.add(id);el.classList.add('sel');});toast(`${selection.size} nodes selected`);},
    clr:()=>clearSelection(),
    save:()=>save(),
    exp:()=>doExport(),
    help:()=>showHelp(),
  });
});

function startEdit(id,f){
  const el=nodeEls[id]?.querySelector(`[data-f="${f}"]`);
  if(!el)return;el.contentEditable='true';el.focus();selAll(el);
}

// ══════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ══════════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  const tag=document.activeElement.tagName;
  if(tag==='INPUT'||tag==='TEXTAREA'||document.activeElement.contentEditable==='true')return;
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();save();}
  if((e.ctrlKey||e.metaKey)&&e.key==='a'){e.preventDefault();
    clearSelection();Object.keys(nd).forEach(id=>{const el=nodeEls[id];if(!el||el.style.display==='none')return;selection.add(id);el.classList.add('sel');});
    toast(`${selection.size} nodes selected`);
  }
  if((e.ctrlKey||e.metaKey)&&e.key==='d'){
    e.preventDefault();
    selection.forEach(id=>dupNode(id));
  }
  if(e.key==='Delete'||e.key==='Backspace'){
    if(selArrow){deleteArrow(selArrow);return;}
    if(selection.size){
      if(!confirm(`Delete ${selection.size} node(s)?`))return;
      selection.forEach(id=>delNode(id));clearSelection();
    }
  }
});

// ══════════════════════════════════════════════════════
// PROGRESS
// ══════════════════════════════════════════════════════
function updateProg(){
  const ids=Object.keys(nd);
  const done=ids.filter(id=>nd[id]?.done).length;
  const pct=ids.length?Math.round(done/ids.length*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=pct+'%';
}

// ══════════════════════════════════════════════════════
// TOAST / MODAL
// ══════════════════════════════════════════════════════
let _tt;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2000);
}

function showModal(title,html){
  document.getElementById('mtitle').textContent=title;
  document.getElementById('mbody').innerHTML=html;
  document.getElementById('mbg').classList.add('show');
}
document.getElementById('mok').addEventListener('click',()=>document.getElementById('mbg').classList.remove('show'));
document.getElementById('mbg').addEventListener('click',e=>{if(e.target===document.getElementById('mbg'))document.getElementById('mbg').classList.remove('show');});

function showHelp(){
  showModal('KEYBOARD & MOUSE REFERENCE',`
    <p><strong>Double-click</strong> any title or subtitle → edit inline.</p>
    <p><strong>Checkbox</strong> on each node → mark done (tracks progress %).</p>
    <p><strong>Drag</strong> → move node. Box-select (drag empty canvas) → select multiple. Selected nodes move together.</p>
    <p><strong>📝 button</strong> on node footer → open notes panel. Notes hidden unless opened.</p>
    <p><strong>✏ Arrow mode</strong> → click source node, then destination. Press Esc to exit.</p>
    <p><strong>Click an arrow</strong> → select it. Edit bar appears: change solid↔dashed, flip direction, delete.</p>
    <p><strong>Right-click node</strong> → state, layer, copy/paste, draw arrow, delete.</p>
    <p><strong>Right-click canvas</strong> → add node/section, paste, select all, save, export.</p>
    <p><strong>Section bands</strong> → drag to reposition, double-click label to rename, ✕ to delete.</p>
    <p><strong>View tabs</strong> → filter to Current or Planned layer.</p>
    <p><kbd>Ctrl+S</kbd> Save &nbsp; <kbd>Ctrl+A</kbd> Select all &nbsp; <kbd>Ctrl+D</kbd> Duplicate selection</p>
    <p><kbd>Delete</kbd> Delete selected nodes or selected arrow &nbsp; <kbd>Esc</kbd> Exit arrow mode / close menus</p>
  `);
}

// ══════════════════════════════════════════════════════
// TOOLBAR BUTTONS
// ══════════════════════════════════════════════════════
document.getElementById('btn-save').addEventListener('click',()=>save());
document.getElementById('btn-help').addEventListener('click',showHelp);
document.getElementById('btn-selall').addEventListener('click',()=>{
  clearSelection();
  Object.keys(nd).forEach(id=>{const el=nodeEls[id];if(!el||el.style.display==='none')return;selection.add(id);el.classList.add('sel');});
  toast(`${selection.size} nodes selected`);
});
document.getElementById('btn-add-section').addEventListener('click',()=>{
  const wrap=document.getElementById('cwrap');
  addSection(wrap.scrollTop+120);
});
document.getElementById('btn-reset-pos').addEventListener('click',()=>{
  if(!confirm('Reset all node positions to default?'))return;
  DEFS.nodes.forEach(([id,,,,, x,y])=>{
    if(!nd[id])return;nd[id].x=x;nd[id].y=y;
    if(nodeEls[id]){nodeEls[id].style.left=x+'px';nodeEls[id].style.top=y+'px';}
  });
  DEFS.sections.forEach(([id,,y])=>{
    if(!sd[id])return;sd[id].y=y;
    if(sectionEls[id])sectionEls[id].style.top=y+'px';
  });
  dirty();drawArrows();
});
document.getElementById('btn-reset-all').addEventListener('click',()=>{
  if(!confirm('Reset EVERYTHING? All edits, done states, notes, and positions will be lost.'))return;
  const d=getDefaults();nd=d.n;ad=d.a;sd=d.s;
  Object.keys(nodeEls).forEach(id=>nodeEls[id]?.remove());
  Object.keys(sectionEls).forEach(id=>sectionEls[id]?.remove());
  nodeEls={};sectionEls={};
  Object.keys(sd).forEach(id=>makeSection(id));
  Object.keys(nd).forEach(id=>makeNode(id));
  save(true);drawArrows();updateProg();applyView();clearSelection();
});
document.getElementById('btn-export').addEventListener('click',doExport);

async function doExport(){
  const btn=document.getElementById('btn-export');
  btn.textContent='⏳…';btn.disabled=true;
  document.querySelectorAll('.nfoot').forEach(e=>{e._op=e.style.opacity;e.style.opacity='0';e.style.pointerEvents='none';});
  try{
    const c=document.getElementById('canvas');
    const cv=await html2canvas(c,{
      backgroundColor:'#090b11',scale:1.5,useCORS:true,logging:false,
      width:c.scrollWidth,height:c.scrollHeight,scrollX:0,scrollY:0,
      windowWidth:c.scrollWidth,windowHeight:c.scrollHeight,
    });
    const a=document.createElement('a');
    a.href=cv.toDataURL('image/png');
    a.download=`homelab_kel_${curView}_${new Date().toISOString().slice(0,10)}.png`;
    a.click();toast('PNG exported');
  }catch(e){alert('Export failed: '+e.message);}
  document.querySelectorAll('.nfoot').forEach(e=>{e.style.opacity=e._op||'';e.style.pointerEvents='';});
  btn.textContent='⬇ PNG';btn.disabled=false;
}

// view tabs
document.getElementById('vtabs').addEventListener('click',e=>{
  const t=e.target.closest('.vtab');if(!t)return;
  document.querySelectorAll('.vtab').forEach(x=>x.classList.remove('on'));
  t.classList.add('on');curView=t.dataset.v;applyView();
});

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
loadState();
Object.keys(sd).forEach(id=>makeSection(id));
Object.keys(nd).forEach(id=>makeNode(id));

requestAnimationFrame(()=>requestAnimationFrame(()=>{
  drawArrows();expand();updateProg();setDirty(false);
}));

window.addEventListener('beforeunload',e=>{
  if(isDirty){e.preventDefault();e.returnValue='Unsaved changes.';}
});
</script>
