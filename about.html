<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/x-icon" href="favicon.ico"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>khennig · about</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Outfit:wght@200;300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #07191f;
      overflow: hidden;
      cursor: none;
      width: 100vw; height: 100vh;
    }

    /* Full-screen whirlpool canvas */
    #pool {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    /* Grain */
    .grain {
      position: fixed; inset: 0; z-index: 2; pointer-events: none; opacity: 0.5;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.88' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.045'/%3E%3C/svg%3E");
    }

    /* The NO. text */
    #no-text {
      position: fixed;
      inset: 0; z-index: 5;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    #no-text span {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      color: white;
      letter-spacing: 0.05em;
      opacity: 0;
      /* starts tiny and far away, animates in */
      font-size: 6vw;
      text-shadow:
        0 0 80px rgba(123,191,212,0.6),
        0 0 160px rgba(123,191,212,0.3);
      animation: emerge 4s 1.2s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    @keyframes emerge {
      0%   { opacity: 0; font-size: 0.5vw; filter: blur(18px); }
      40%  { opacity: 0.7; filter: blur(4px); }
      70%  { opacity: 1; filter: blur(0); }
      85%  { font-size: 7.5vw; }
      100% { opacity: 1; font-size: 6.5vw; filter: blur(0); }
    }

    /* Nav elements */
    nav.top {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 2.2rem 3rem;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 10;
    }
    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem; font-weight: 300;
      letter-spacing: 0.45em; color: rgba(255,255,255,0.7);
      text-transform: lowercase; text-decoration: none;
    }
    .page-tag {
      font-size: 0.6rem; letter-spacing: 0.3em; text-transform: uppercase;
      color: rgba(200,232,245,0.35);
    }
    footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 1.5rem 3rem;
      border-top: 1px solid rgba(255,255,255,0.05);
      display: flex; justify-content: space-between; align-items: center;
      z-index: 10;
    }
    footer span { font-size: 0.6rem; letter-spacing: 0.1em; color: rgba(255,255,255,0.15); }

    /* Cursor */
    #cur  { position: fixed; width: 7px; height: 7px; background: white; border-radius: 50%; pointer-events: none; z-index: 99999; left:-20px; top:-20px; transform: translate(-50%,-50%); mix-blend-mode: difference; transition: width .2s, height .2s; }
    #crng { position: fixed; width: 28px; height: 28px; border: 1px solid rgba(255,255,255,0.25); border-radius: 50%; pointer-events: none; z-index: 99998; left:-20px; top:-20px; transform: translate(-50%,-50%); transition: width .3s, height .3s; }

    /* Side nav */
    .side-trigger { position: fixed; left: 0; top: 0; width: 20px; height: 100vh; z-index: 200; }
    .side-nav { position: fixed; left: 0; top: 0; width: 220px; height: 100vh; z-index: 199; display: flex; flex-direction: column; justify-content: center; padding: 3rem 2.5rem; background: linear-gradient(to right, rgba(7,18,26,0.97), rgba(7,18,26,0.85)); backdrop-filter: blur(20px); border-right: 1px solid rgba(255,255,255,0.06); transform: translateX(-100%); transition: transform 0.45s cubic-bezier(0.16,1,0.3,1); pointer-events: none; }
    .side-nav.open { transform: translateX(0); pointer-events: all; }
    .nav-hint { position: fixed; left: 0; top: 50%; transform: translateY(-50%); z-index: 198; display: flex; align-items: center; gap: 0.5rem; padding: 0.9rem 0.7rem 0.9rem 0.5rem; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-left: none; border-radius: 0 6px 6px 0; backdrop-filter: blur(10px); pointer-events: none; transition: opacity 0.4s, transform 0.45s cubic-bezier(0.16,1,0.3,1); }
    .nav-hint.hidden { opacity: 0; transform: translateY(-50%) translateX(-16px); }
    .nav-hint-arrow { color: rgba(168,216,238,0.55); font-size: 0.75rem; animation: nudge 2.5s ease-in-out infinite; }
    .nav-hint-label { writing-mode: vertical-rl; text-orientation: mixed; transform: rotate(180deg); font-size: 0.48rem; letter-spacing: 0.35em; text-transform: uppercase; color: rgba(255,255,255,0.2); line-height: 1; }
    .side-nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 300; letter-spacing: 0.45em; color: rgba(255,255,255,0.3); text-transform: lowercase; margin-bottom: 3rem; }
    .side-nav-links { display: flex; flex-direction: column; }
    .side-nav-links a { display: flex; align-items: center; gap: 1rem; font-size: 0.65rem; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(255,255,255,0.35); text-decoration: none; padding: 0.9rem 0; border-bottom: 1px solid rgba(255,255,255,0.05); transition: color 0.3s, padding-left 0.3s; cursor: none; }
    .side-nav-links a:last-child { border-bottom: none; }
    .side-nav-links a.active { color: rgba(168,216,238,0.8); }
    .n-dot { width: 4px; height: 4px; border-radius: 50%; background: rgba(168,216,238,0.4); flex-shrink: 0; transition: background 0.3s, transform 0.3s; }
    .side-nav-links a:hover { color: rgba(255,255,255,0.85); padding-left: 0.4rem; }
    .side-nav-links a:hover .n-dot, .side-nav-links a.active .n-dot { background: rgba(168,216,238,1); transform: scale(1.6); }
    .side-nav-footer { margin-top: 3rem; font-size: 0.55rem; letter-spacing: 0.2em; color: rgba(255,255,255,0.15); text-transform: uppercase; }
    @keyframes nudge { 0%,100%{transform:translateX(0)} 50%{transform:translateX(3px)} }
  </style>
</head>
<body>

<canvas id="pool"></canvas>
<div class="grain"></div>

<!-- The dramatic NO. -->
<div id="no-text"><span>no.</span></div>

<!-- Top nav -->
<nav class="top">
  <a href="index.html" class="logo">khennig</a>
  <span class="page-tag">about</span>
</nav>

<!-- Footer -->
<footer>
  <span>khennig.com</span>
  <span>&copy; 2026</span>
</footer>

<!-- Cursor -->
<div id="cur"></div>
<div id="crng"></div>

<!-- Side nav -->
<div class="side-trigger" id="sideTrigger"></div>
<div class="nav-hint" id="navHint">
  <div class="nav-hint-arrow">&#8250;</div>
  <div class="nav-hint-label">nav</div>
</div>
<nav class="side-nav" id="sideNav">
  <div class="side-nav-logo">khennig</div>
  <div class="side-nav-links">
    <a href="index.html"><span class="n-dot"></span>Home</a>
    <a href="about.html" class="active"><span class="n-dot"></span>About</a>
    <a href="work.html"><span class="n-dot"></span>Work</a>
    <a href="thoughts.html"><span class="n-dot"></span>Thoughts</a>
    <a href="contact.html"><span class="n-dot"></span>Contact</a>
  </div>
  <div class="side-nav-footer">khennig.com</div>
</nav>

<script>
'use strict';

/* ═══════════════════════════════════════
   WHIRLPOOL CANVAS
═══════════════════════════════════════ */
const canvas = document.getElementById('pool');
const ctx    = canvas.getContext('2d');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Spiral ring particles ──
// Each ring is a circle of particles that rotates and spirals inward/outward
// creating a 3D tunnel / whirlpool illusion

const RINGS     = 48;    // number of rings in the tunnel
const PTS       = 64;    // points per ring
const MAX_DEPTH = 800;   // depth of the tunnel

let rings = [];

function buildRings() {
  rings = [];
  for (let i = 0; i < RINGS; i++) {
    const depth   = (i / RINGS) * MAX_DEPTH;          // 0 = close, MAX = far
    const radius  = 60 + (1 - i / RINGS) * Math.min(canvas.width, canvas.height) * 0.52;
    const opacity = 0.06 + (1 - i / RINGS) * 0.28;
    const speed   = 0.0008 + (i / RINGS) * 0.0022;    // far rings spin slower
    const offset  = (i / RINGS) * Math.PI * 3;        // phase stagger
    rings.push({ depth, radius, opacity, speed, offset, phase: offset });
  }
}
buildRings();
window.addEventListener('resize', buildRings);

// ── Color palette ──
function ringColor(t, alpha) {
  // t: 0 (near) → 1 (far)
  // Near: bright sky blue  →  far: deep ocean dark
  const r = Math.round(7  + t * (14 - 7));
  const g = Math.round(112 + t * (25 - 112));
  const b = Math.round(149 + t * (44 - 149));
  return `rgba(${r},${g},${b},${alpha})`;
}

// ── Draw a single ring ──
function drawRing(ring, t) {
  const cx = canvas.width  * 0.5;
  const cy = canvas.height * 0.5;

  // Perspective scale: far rings appear smaller
  const scale = 1 - (ring.depth / MAX_DEPTH) * 0.85;

  const r   = ring.radius * scale;
  const col = ringColor(ring.depth / MAX_DEPTH, ring.opacity * scale);

  ctx.beginPath();
  for (let p = 0; p <= PTS; p++) {
    const angle = (p / PTS) * Math.PI * 2 + ring.phase;
    // Add a subtle wave ripple to the radius — makes it feel like water
    const wobble = 1 + Math.sin(angle * 3 + t * 2.5 + ring.depth * 0.008) * 0.04;
    const x = cx + Math.cos(angle) * r * wobble;
    const y = cy + Math.sin(angle) * r * wobble * 0.38; // flatten Y for perspective
    p === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.strokeStyle = col;
  ctx.lineWidth   = Math.max(0.4, 1.6 * scale);
  ctx.stroke();

  // Spoke lines radiating from centre on every Nth point — network feel
  if (ring.depth < MAX_DEPTH * 0.55) {
    const spokeStep = 8;
    for (let p = 0; p < PTS; p += spokeStep) {
      const angle = (p / PTS) * Math.PI * 2 + ring.phase;
      const wobble = 1 + Math.sin(angle * 3 + t * 2.5 + ring.depth * 0.008) * 0.04;
      const x = cx + Math.cos(angle) * r * wobble;
      const y = cy + Math.sin(angle) * r * wobble * 0.38;
      const innerR = r * 0.35;
      const ix = cx + Math.cos(angle) * innerR;
      const iy = cy + Math.sin(angle) * innerR * 0.38;

      const spokeAlpha = ring.opacity * scale * 0.35;
      ctx.beginPath();
      ctx.moveTo(ix, iy);
      ctx.lineTo(x, y);
      ctx.strokeStyle = `rgba(168,216,238,${spokeAlpha})`;
      ctx.lineWidth   = Math.max(0.2, 0.6 * scale);
      ctx.stroke();
    }
  }
}

// ── Background gradient ──
function drawBg() {
  const g = ctx.createRadialGradient(
    canvas.width * .5, canvas.height * .5, 0,
    canvas.width * .5, canvas.height * .5, Math.max(canvas.width, canvas.height) * 0.7
  );
  g.addColorStop(0,   '#0d3548');
  g.addColorStop(0.4, '#091f2c');
  g.addColorStop(1,   '#040e14');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

// ── Mist glow at centre ──
function drawGlow(t) {
  const cx = canvas.width  * .5;
  const cy = canvas.height * .5;
  const pulse = 1 + Math.sin(t * 1.1) * 0.12;
  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, 180 * pulse);
  g.addColorStop(0,   'rgba(123,191,212,0.18)');
  g.addColorStop(0.4, 'rgba(40,120,160,0.07)');
  g.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(cx, cy, 300 * pulse, 0, Math.PI * 2);
  ctx.fill();
}

// ── Falling water streaks (matching site theme) ──
const STREAKS = 55;
const streaks = [];
function mkStreak() {
  return {
    x:   Math.random() * canvas.width,
    y:   Math.random() * canvas.height,
    len: 50 + Math.random() * 180,
    spd: 0.6 + Math.random() * 1.8,
    op:  0.03 + Math.random() * 0.1,
    w:   0.4 + Math.random() * 1.2
  };
}
for (let i = 0; i < STREAKS; i++) streaks.push(mkStreak());

function drawStreaks() {
  streaks.forEach(s => {
    const g = ctx.createLinearGradient(s.x, s.y, s.x, s.y + s.len);
    g.addColorStop(0,   `rgba(200,240,255,0)`);
    g.addColorStop(0.5, `rgba(200,240,255,${s.op})`);
    g.addColorStop(1,   `rgba(200,240,255,0)`);
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(s.x, s.y + s.len);
    ctx.strokeStyle = g;
    ctx.lineWidth   = s.w;
    ctx.stroke();
    s.y += s.spd;
    if (s.y > canvas.height + s.len) {
      s.y = -s.len;
      s.x = Math.random() * canvas.width;
    }
  });
}

// ── Main animation loop ──
let startTime = null;

function frame(ts) {
  if (!startTime) startTime = ts;
  const t = (ts - startTime) / 1000; // seconds

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBg();
  drawGlow(t);
  drawStreaks();

  // Update and draw rings — sorted back to front (far first)
  for (let i = rings.length - 1; i >= 0; i--) {
    rings[i].phase += rings[i].speed;
    drawRing(rings[i], t);
  }

  // Vignette overlay
  const vig = ctx.createRadialGradient(
    canvas.width*.5, canvas.height*.5, canvas.height * 0.25,
    canvas.width*.5, canvas.height*.5, canvas.height * 0.85
  );
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(4,14,20,0.75)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ═══════════════════════════════════════
   CURSOR
═══════════════════════════════════════ */
(function() {
  const dot  = document.getElementById('cur');
  const ring = document.getElementById('crng');
  let mx=0, my=0, rx=0, ry=0;
  document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; });
  (function tick(){
    rx += (mx-rx)*0.12; ry += (my-ry)*0.12;
    dot.style.left=mx+'px';  dot.style.top=my+'px';
    ring.style.left=rx+'px'; ring.style.top=ry+'px';
    requestAnimationFrame(tick);
  })();
  document.querySelectorAll('a,button').forEach(el=>{
    el.addEventListener('mouseenter',()=>{ dot.style.width='14px'; dot.style.height='14px'; ring.style.width='44px'; ring.style.height='44px'; });
    el.addEventListener('mouseleave',()=>{ dot.style.width='7px';  dot.style.height='7px';  ring.style.width='28px'; ring.style.height='28px'; });
  });
})();

/* ═══════════════════════════════════════
   SIDE NAV
═══════════════════════════════════════ */
(function() {
  const sideNav  = document.getElementById('sideNav');
  const sideTrig = document.getElementById('sideTrigger');
  const navHint  = document.getElementById('navHint');
  let open=false, timer;
  function openNav()  { clearTimeout(timer); sideNav.classList.add('open'); navHint.classList.add('hidden'); open=true; }
  function closeNav() { timer=setTimeout(()=>{ sideNav.classList.remove('open'); navHint.classList.remove('hidden'); open=false; },280); }
  sideTrig.addEventListener('mouseenter', openNav);
  sideNav.addEventListener('mouseenter', ()=>{ clearTimeout(timer); open=true; });
  sideNav.addEventListener('mouseleave', closeNav);
  document.addEventListener('mousemove', e=>{
    if (e.clientX<20 && !open) openNav();
    if (e.clientX>=40) sideNav.classList.remove('peek');
    else if (!open) sideNav.classList.add('peek');
  });
})();
</script>
</body>
</html>
